<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALURAN STOK</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:url('background.png') no-repeat center center/cover;
    min-height:100vh;
}

/* Overlay gelap + tengah */
.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Judul besar */
h1{
    color:#00ffcc;
    font-size:34px;
    margin-bottom:45px;
    letter-spacing:2px;
    text-shadow:0 0 15px #00ffcc;
}

/* Tombol besar */
a{
    display:block;
    width:95%;
    max-width:450px;
    margin:20px 0;
    padding:22px;
    text-align:center;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    color:white;
    border:2px solid #00ffcc;
    border-radius:18px;
    transition:0.4s;
}

/* Hover effect */
a:hover{
    background:#00ffcc;
    color:black;
    box-shadow:0 0 25px #00ffcc;
    transform:scale(1.05);
}

/* Tombol kembali */
.back{
    border-color:red;
}

.back:hover{
    background:red;
    box-shadow:0 0 25px red;
}
</style>
</head>

<body>

<div class="overlay">
    <h1>SALURAN STOK</h1>

    <a href="https://whatsapp.com/channel/0029VbAOfSUFi8xeKNTM922Q">
        SALURAN STOK ABAI 1
    </a>

    <a href="https://whatsapp.com/channel/0029Vb6p0mjKQuJRM6jv0I2i">
        SALURAN STOK ABAI 2
    </a>

    <a href="https://whatsapp.com/channel/0029Vb80G8R8kyyIOnstYF1j">
        SALURAN STOK ABAI 3
    </a>

    <a href="index.html" class="back">
        ⬅ Kembali
    </a>
</div>

</body>
</html>
